<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gestor de Líneas de Autobús (EMT Valencia)</title>
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Space Grotesk", "sans-serif"],
                display: ["Fraunces", "serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="emt.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="relative isolate min-h-screen overflow-hidden pb-20">
      <main class="mx-auto mt-8 max-w-5xl px-4 sm:px-6 lg:px-8">
        <section
          id="menuView"
          class="-mx-4 -mt-8 flex min-h-[calc(100dvh-5rem)] flex-col items-center justify-center sm:-mx-6 lg:-mx-8"
        >
          <svg
            viewBox="0 0 400 260"
            aria-hidden="true"
            class="w-full max-w-lg drop-shadow-2xl px-6"
          >
            <!-- Defs -->
            <defs>
              <linearGradient id="busShine" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#fff" stop-opacity=".18" />
                <stop offset="50%" stop-color="#fff" stop-opacity="0" />
              </linearGradient>
              <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#fff" stop-opacity=".4" />
                <stop offset="100%" stop-color="#fff" stop-opacity="0" />
              </linearGradient>
            </defs>
            <!-- Sky -->
            <rect width="400" height="180" fill="#0f172a" rx="20" />
            <!-- Stars -->
            <circle cx="40" cy="30" r="2" fill="#fde68a" opacity=".7" />
            <circle cx="120" cy="20" r="1.5" fill="#fde68a" opacity=".5" />
            <circle cx="250" cy="35" r="2.5" fill="#fde68a" opacity=".6" />
            <circle cx="340" cy="18" r="1.8" fill="#fde68a" opacity=".4" />
            <circle cx="180" cy="50" r="1" fill="#fde68a" opacity=".5" />
            <circle cx="310" cy="55" r="1.5" fill="#fde68a" opacity=".6" />
            <!-- Moon -->
            <circle cx="340" cy="60" r="22" fill="#fef9c3" opacity=".15" />
            <circle cx="340" cy="60" r="16" fill="#fef08a" opacity=".25" />
            <!-- Road -->
            <rect y="180" width="400" height="80" fill="#1e293b" rx="0" />
            <rect
              x="0"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="50"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="100"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="150"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="200"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="250"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="300"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <rect
              x="350"
              y="216"
              width="30"
              height="4"
              rx="2"
              fill="#fbbf24"
              opacity=".5"
            />
            <!-- Buildings silhouette -->
            <rect x="10" y="120" width="35" height="60" rx="3" fill="#334155" />
            <rect x="50" y="100" width="25" height="80" rx="3" fill="#475569" />
            <rect x="80" y="130" width="30" height="50" rx="3" fill="#334155" />
            <rect
              x="300"
              y="110"
              width="40"
              height="70"
              rx="3"
              fill="#334155"
            />
            <rect
              x="345"
              y="125"
              width="30"
              height="55"
              rx="3"
              fill="#475569"
            />
            <!-- Building windows -->
            <rect
              x="17"
              y="128"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".6"
            />
            <rect
              x="30"
              y="128"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".4"
            />
            <rect
              x="17"
              y="142"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".3"
            />
            <rect
              x="30"
              y="142"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".6"
            />
            <rect
              x="55"
              y="108"
              width="5"
              height="5"
              rx="1"
              fill="#fef08a"
              opacity=".5"
            />
            <rect
              x="65"
              y="108"
              width="5"
              height="5"
              rx="1"
              fill="#fef08a"
              opacity=".3"
            />
            <rect
              x="55"
              y="120"
              width="5"
              height="5"
              rx="1"
              fill="#fef08a"
              opacity=".6"
            />
            <rect
              x="308"
              y="118"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".4"
            />
            <rect
              x="322"
              y="118"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".5"
            />
            <rect
              x="308"
              y="132"
              width="6"
              height="6"
              rx="1"
              fill="#fef08a"
              opacity=".6"
            />
            <!-- Bus stop sign (static) -->
            <rect x="30" y="155" width="4" height="45" rx="2" fill="#94a3b8" />
            <rect x="20" y="148" width="24" height="18" rx="4" fill="#f472b6" />
            <text
              x="32"
              y="160"
              text-anchor="middle"
              fill="#fff"
              font-size="8"
              font-family="sans-serif"
              font-weight="bold"
            >
              H
            </text>
            <!-- Bus group (animated: enters from right) -->
            <g>
              <animateTransform
                attributeName="transform"
                type="translate"
                from="420 0"
                to="0 0"
                dur="2.2s"
                fill="freeze"
                calcMode="spline"
                keySplines="0.25 0.1 0.25 1"
                keyTimes="0;1"
              />
              <g transform="translate(400,0) scale(-1,1)">
                <!-- Bus body -->
                <rect
                  x="115"
                  y="145"
                  width="170"
                  height="55"
                  rx="12"
                  fill="#22d3ee"
                />
                <rect
                  x="115"
                  y="145"
                  width="170"
                  height="55"
                  rx="12"
                  fill="url(#busShine)"
                />
                <!-- Bus top -->
                <rect
                  x="125"
                  y="138"
                  width="150"
                  height="12"
                  rx="6"
                  fill="#06b6d4"
                />
                <!-- Destination sign -->
                <rect
                  x="140"
                  y="140"
                  width="80"
                  height="8"
                  rx="3"
                  fill="#083344"
                />
                <text
                  x="180"
                  y="147"
                  text-anchor="middle"
                  fill="#22d3ee"
                  font-size="6"
                  font-family="sans-serif"
                  font-weight="bold"
                >
                  EMT VALENCIA
                </text>
                <!-- Windshield -->
                <rect
                  x="250"
                  y="152"
                  width="28"
                  height="24"
                  rx="5"
                  fill="#e0f2fe"
                  opacity=".9"
                />
                <rect
                  x="250"
                  y="152"
                  width="28"
                  height="24"
                  rx="5"
                  fill="url(#glassShine)"
                />
                <!-- Windows -->
                <rect
                  x="130"
                  y="155"
                  width="22"
                  height="18"
                  rx="4"
                  fill="#e0f2fe"
                  opacity=".85"
                />
                <rect
                  x="158"
                  y="155"
                  width="22"
                  height="18"
                  rx="4"
                  fill="#e0f2fe"
                  opacity=".85"
                />
                <rect
                  x="186"
                  y="155"
                  width="22"
                  height="18"
                  rx="4"
                  fill="#e0f2fe"
                  opacity=".85"
                />
                <rect
                  x="214"
                  y="155"
                  width="22"
                  height="18"
                  rx="4"
                  fill="#e0f2fe"
                  opacity=".85"
                />
                <!-- Door -->
                <rect
                  x="237"
                  y="162"
                  width="10"
                  height="30"
                  rx="3"
                  fill="#0e7490"
                />
                <rect
                  x="241"
                  y="166"
                  width="2"
                  height="8"
                  rx="1"
                  fill="#a5f3fc"
                />
                <!-- Headlights -->
                <circle cx="288" cy="185" r="5" fill="#fef08a" />
                <circle cx="288" cy="185" r="8" fill="#fef08a" opacity=".15" />
                <circle cx="122" cy="185" r="4" fill="#fca5a5" opacity=".8" />
                <!-- Bus stripe -->
                <rect
                  x="115"
                  y="180"
                  width="170"
                  height="4"
                  rx="2"
                  fill="#0891b2"
                />
                <!-- Wheels -->
                <circle cx="150" cy="202" r="12" fill="#1e293b" />
                <circle cx="150" cy="202" r="7" fill="#64748b" />
                <circle cx="150" cy="202" r="3" fill="#94a3b8" />
                <circle cx="255" cy="202" r="12" fill="#1e293b" />
                <circle cx="255" cy="202" r="7" fill="#64748b" />
                <circle cx="255" cy="202" r="3" fill="#94a3b8" />
                <!-- Speed lines (fade out when bus stops) -->
                <g>
                  <animate
                    attributeName="opacity"
                    values="0;0;.6;.6;0"
                    keyTimes="0;0.05;0.15;0.75;1"
                    dur="2.2s"
                    fill="freeze"
                  />
                  <line
                    x1="95"
                    y1="165"
                    x2="108"
                    y2="165"
                    stroke="#94a3b8"
                    stroke-width="1.5"
                    opacity=".4"
                    stroke-linecap="round"
                  />
                  <line
                    x1="90"
                    y1="175"
                    x2="106"
                    y2="175"
                    stroke="#94a3b8"
                    stroke-width="1.5"
                    opacity=".3"
                    stroke-linecap="round"
                  />
                  <line
                    x1="88"
                    y1="185"
                    x2="104"
                    y2="185"
                    stroke="#94a3b8"
                    stroke-width="1.5"
                    opacity=".4"
                    stroke-linecap="round"
                  />
                </g>
              </g>
            </g>
          </svg>
          <h1
            class="mt-6 text-center font-display text-3xl font-bold text-white sm:text-4xl"
          >
            EMT Valencia
          </h1>
          <p class="mt-2 text-center text-sm text-slate-400">
            Consulta lineas, paradas y llegadas en tiempo real
          </p>
        </section>

        <section id="linesView" class="hidden bg-transparent p-0">
          <div>
            <div class="relative">
              <input
                id="searchLine"
                placeholder="Buscar por numero de linea o nombre..."
                class="w-full rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 pr-10 text-sm text-slate-100 placeholder:text-slate-400 focus:border-cyan-300/70 focus:outline-none focus:ring-2 focus:ring-cyan-400/40"
              />
              <button
                id="clearSearchLineBtn"
                type="button"
                aria-label="Limpiar busqueda de lineas"
                class="absolute right-2 top-1/2 hidden -translate-y-1/2 rounded-lg border border-white/20 bg-white/10 px-2 py-0.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                X
              </button>
            </div>
          </div>

          <div
            class="custom-scroll mt-5 overflow-auto rounded-2xl border border-white/10"
          >
            <table
              class="min-w-full divide-y divide-white/10 text-left text-sm"
            >
              <thead class="bg-slate-900/70 text-slate-300">
                <tr>
                  <th class="px-4 py-3 font-medium">Nº linea</th>
                  <th class="px-4 py-3 font-medium">Nombre</th>
                </tr>
              </thead>
              <tbody
                id="linesTableBody"
                class="divide-y divide-white/10 bg-white/[0.03]"
              ></tbody>
            </table>
          </div>
        </section>

        <section id="stopsView" class="hidden bg-transparent p-0">
          <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
            <div class="relative">
              <input
                id="searchStopName"
                placeholder="Buscar por nombre de parada..."
                class="w-full rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 pr-10 text-sm text-slate-100 placeholder:text-slate-400 focus:border-fuchsia-300/70 focus:outline-none focus:ring-2 focus:ring-fuchsia-400/40"
              />
              <button
                id="clearSearchStopNameBtn"
                type="button"
                aria-label="Limpiar busqueda de paradas"
                class="absolute right-2 top-1/2 hidden -translate-y-1/2 rounded-lg border border-white/20 bg-white/10 px-2 py-0.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                X
              </button>
            </div>
            <div class="relative">
              <button
                id="stopLineFilterBtn"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                class="flex w-full items-center justify-between rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 text-sm text-slate-100 transition hover:bg-slate-900/40 focus:border-fuchsia-300/70 focus:outline-none focus:ring-2 focus:ring-fuchsia-400/40"
              >
                <span id="stopLineFilterLabel">Todas las lineas</span>
                <span class="text-xs text-slate-300/80">▼</span>
              </button>
              <div
                id="stopLineFilterPanel"
                class="custom-scroll absolute z-20 mt-2 hidden max-h-64 w-full overflow-auto rounded-2xl border border-white/15 bg-slate-900/95 p-2 shadow-2xl"
              >
                <div class="mb-2 flex items-center justify-between px-1">
                  <p
                    class="text-xs uppercase tracking-[0.18em] text-fuchsia-100/80"
                  >
                    Filtrar lineas
                  </p>
                  <button
                    id="clearStopLineFiltersBtn"
                    type="button"
                    class="rounded-lg border border-white/20 bg-white/10 px-2 py-1 text-[11px] font-semibold text-slate-100 transition hover:bg-white/15"
                  >
                    Limpiar
                  </button>
                </div>
                <div id="stopLineFilterOptions" class="space-y-1"></div>
              </div>
            </div>
          </div>

          <div
            class="custom-scroll mt-5 overflow-auto rounded-2xl border border-white/10"
          >
            <table
              class="min-w-full divide-y divide-white/10 text-left text-sm"
            >
              <thead class="bg-slate-900/70 text-slate-300">
                <tr>
                  <th
                    class="w-[4ch] max-w-[4ch] whitespace-nowrap px-1 py-3 font-medium"
                  >
                    ID parada
                  </th>
                  <th class="w-[58%] px-4 py-3 font-medium">
                    Nombre de parada
                  </th>
                  <th class="px-4 py-3 font-medium">Linea</th>
                </tr>
              </thead>
              <tbody
                id="stopsTableBody"
                class="divide-y divide-white/10 bg-white/[0.03]"
              ></tbody>
            </table>
          </div>
          <div class="mt-4 flex flex-wrap items-center justify-between gap-2">
            <p id="stopsPageInfo" class="text-xs text-slate-300/80">
              Pagina 1 de 1
            </p>
            <div class="flex items-center gap-2">
              <button
                id="stopsPrevPageBtn"
                class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                Anterior
              </button>
              <button
                id="stopsNextPageBtn"
                class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                Siguiente
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <!-- iOS-style bottom tab bar -->
    <nav
      id="mainTabBar"
      class="fixed bottom-0 left-0 right-0 z-[1000] flex items-end justify-around border-t border-white/15 bg-slate-900/90 px-2 pb-[env(safe-area-inset-bottom,4px)] pt-1.5 backdrop-blur-xl"
    >
      <button
        id="tabHome"
        type="button"
        class="flex flex-col items-center gap-0.5 px-4 py-1 text-white"
      >
        <span class="text-xl leading-none">⌂</span>
        <span class="text-[10px] font-medium leading-none">Inicio</span>
      </button>
      <button
        id="tabLines"
        type="button"
        class="flex flex-col items-center gap-0.5 px-4 py-1 text-slate-400"
      >
        <span class="text-xl leading-none">🚌</span>
        <span class="text-[10px] font-medium leading-none">Lineas</span>
      </button>
      <button
        id="tabStops"
        type="button"
        class="flex flex-col items-center gap-0.5 px-4 py-1 text-slate-400"
      >
        <span class="text-xl leading-none">🚏</span>
        <span class="text-[10px] font-medium leading-none">Paradas</span>
      </button>
      <button
        id="tabSettings"
        type="button"
        class="flex flex-col items-center gap-0.5 px-4 py-1 text-slate-400"
      >
        <span class="text-xl leading-none">⚙</span>
        <span class="text-[10px] font-medium leading-none">Ajustes</span>
      </button>
    </nav>

    <!-- Settings overlay -->
    <div
      id="settingsOverlay"
      class="fixed inset-0 z-[1100] hidden flex-col bg-slate-950"
    >
      <div
        class="flex h-12 shrink-0 items-center gap-3 border-b border-white/20 bg-slate-900/95 px-3 text-slate-100"
      >
        <button
          id="settingsBackBtn"
          type="button"
          class="flex h-8 w-8 items-center justify-center rounded-full bg-white/10 text-lg text-slate-100 transition hover:bg-white/15"
        >
          ‹
        </button>
        <div class="truncate text-sm font-semibold">Ajustes</div>
      </div>
      <div class="flex-1 overflow-y-auto p-4">
        <div
          class="mx-auto max-w-md rounded-2xl border border-white/15 bg-white/[0.06] p-5"
        >
          <h3 class="mb-4 text-sm font-bold text-slate-100">Mapa</h3>
          <label
            class="flex items-center justify-between gap-4 rounded-xl border border-white/10 bg-white/[0.04] px-4 py-3"
          >
            <div>
              <p class="text-sm font-semibold text-slate-100">
                Refresco ubicacion (seg)
              </p>
              <p class="mt-0.5 text-xs text-slate-400">
                Intervalo de actualizacion de la posicion en tiempo real
              </p>
            </div>
            <input
              id="settingsRealtimeInterval"
              type="number"
              min="1"
              max="60"
              step="1"
              value="5"
              class="w-20 rounded-xl border border-white/20 bg-slate-950/40 px-3 py-1.5 text-center text-sm text-slate-100 focus:border-cyan-300/70 focus:outline-none focus:ring-2 focus:ring-cyan-400/40"
            />
          </label>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="emt.js"></script>
  </body>
</html>
