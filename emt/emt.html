<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Gestor de Líneas de Autobús (EMT Valencia)</title>
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              fontFamily: {
                sans: ["Space Grotesk", "sans-serif"],
                display: ["Fraunces", "serif"],
              },
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="emt.css" />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="relative isolate min-h-screen overflow-hidden pb-8">
      <main class="mx-auto mt-8 max-w-5xl px-4 sm:px-6 lg:px-8">
        <section
          id="menuView"
          class="rounded-3xl border border-white/15 bg-white/[0.08] p-6 shadow-xl shadow-slate-950/20 backdrop-blur-xl sm:p-8"
        >
          <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
            <button
              id="goLinesBtn"
              class="group relative overflow-hidden rounded-3xl border border-cyan-300/40 bg-gradient-to-br from-cyan-500/30 via-sky-500/25 to-blue-700/35 p-6 text-left shadow-lg shadow-cyan-900/20 transition duration-300 hover:-translate-y-1 hover:brightness-110"
            >
              <div
                class="pointer-events-none absolute -right-10 -top-10 h-32 w-32 rounded-full bg-cyan-300/20 blur-2xl"
              ></div>
              <div class="relative flex items-start gap-4">
                <div
                  class="h-16 w-16 shrink-0 rounded-2xl border border-cyan-200/40 bg-slate-950/35 p-2"
                >
                  <svg
                    viewBox="0 0 64 64"
                    aria-hidden="true"
                    class="h-full w-full"
                  >
                    <rect
                      x="8"
                      y="12"
                      width="48"
                      height="34"
                      rx="8"
                      fill="#22d3ee"
                    />
                    <rect
                      x="14"
                      y="18"
                      width="36"
                      height="10"
                      rx="3"
                      fill="#083344"
                    />
                    <rect
                      x="14"
                      y="31"
                      width="10"
                      height="10"
                      rx="2"
                      fill="#e0f2fe"
                    />
                    <rect
                      x="28"
                      y="31"
                      width="10"
                      height="10"
                      rx="2"
                      fill="#e0f2fe"
                    />
                    <rect
                      x="42"
                      y="31"
                      width="8"
                      height="10"
                      rx="2"
                      fill="#e0f2fe"
                    />
                    <circle cx="21" cy="48" r="5" fill="#f8fafc" />
                    <circle cx="43" cy="48" r="5" fill="#f8fafc" />
                  </svg>
                </div>
                <div>
                  <p
                    class="text-xs uppercase tracking-[0.18em] text-cyan-100/80"
                  >
                    Vista
                  </p>
                  <p class="mt-1 text-2xl font-semibold text-white">
                    Lineas de autobus
                  </p>
                  <p class="mt-2 text-sm text-cyan-100/90">
                    Consulta el listado de lineas disponibles.
                  </p>
                </div>
              </div>
            </button>

            <button
              id="goStopsBtn"
              class="group relative overflow-hidden rounded-3xl border border-fuchsia-300/35 bg-gradient-to-br from-fuchsia-500/25 via-rose-500/25 to-orange-500/30 p-6 text-left shadow-lg shadow-fuchsia-900/20 transition duration-300 hover:-translate-y-1 hover:brightness-110"
            >
              <div
                class="pointer-events-none absolute -right-10 -top-10 h-32 w-32 rounded-full bg-fuchsia-300/20 blur-2xl"
              ></div>
              <div class="relative flex items-start gap-4">
                <div
                  class="h-16 w-16 shrink-0 rounded-2xl border border-fuchsia-200/35 bg-slate-950/35 p-2"
                >
                  <svg
                    viewBox="0 0 64 64"
                    aria-hidden="true"
                    class="h-full w-full"
                  >
                    <rect
                      x="24"
                      y="8"
                      width="16"
                      height="42"
                      rx="3"
                      fill="#f472b6"
                    />
                    <rect
                      x="14"
                      y="14"
                      width="36"
                      height="16"
                      rx="4"
                      fill="#4a044e"
                    />
                    <circle cx="32" cy="22" r="4" fill="#fdf2f8" />
                    <rect
                      x="18"
                      y="52"
                      width="28"
                      height="4"
                      rx="2"
                      fill="#fdf2f8"
                    />
                  </svg>
                </div>
                <div>
                  <p
                    class="text-xs uppercase tracking-[0.18em] text-fuchsia-100/80"
                  >
                    Vista
                  </p>
                  <p class="mt-1 text-2xl font-semibold text-white">Paradas</p>
                  <p class="mt-2 text-sm text-fuchsia-100/90">
                    Explora todas las paradas y su detalle en mapa.
                  </p>
                </div>
              </div>
            </button>
          </div>
        </section>

        <section
          id="linesView"
          class="hidden rounded-3xl border border-white/15 bg-white/[0.08] p-5 shadow-xl shadow-slate-950/20 backdrop-blur-xl sm:p-6"
        >
          <nav
            class="mb-4 flex flex-wrap items-center gap-2 rounded-2xl border border-white/15 bg-slate-900/45 p-2"
          >
            <button
              id="linesBackIosBtn"
              aria-label="Atras"
              class="inline-flex items-center gap-1.5 rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-100 transition hover:bg-white/15"
            >
              <span class="text-base leading-none">‹</span>
            </button>
            <button
              id="linesMenuToMenuBtn"
              aria-label="Inicio"
              class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-100 transition hover:bg-white/15"
            >
              ⌂
            </button>
            <button
              id="linesMenuToStopsBtn"
              aria-label="Paradas"
              class="rounded-xl border border-fuchsia-300/35 bg-fuchsia-500/15 px-3 py-1.5 text-sm font-semibold text-fuchsia-100 transition hover:bg-fuchsia-500/25"
            >
              🚏
            </button>
          </nav>

          <div>
            <div class="relative">
              <input
                id="searchLine"
                placeholder="Buscar por numero de linea o nombre..."
                class="w-full rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 pr-10 text-sm text-slate-100 placeholder:text-slate-400 focus:border-cyan-300/70 focus:outline-none focus:ring-2 focus:ring-cyan-400/40"
              />
              <button
                id="clearSearchLineBtn"
                type="button"
                aria-label="Limpiar busqueda de lineas"
                class="absolute right-2 top-1/2 hidden -translate-y-1/2 rounded-lg border border-white/20 bg-white/10 px-2 py-0.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                X
              </button>
            </div>
          </div>

          <div
            class="custom-scroll mt-5 overflow-auto rounded-2xl border border-white/10"
          >
            <table
              class="min-w-full divide-y divide-white/10 text-left text-sm"
            >
              <thead class="bg-slate-900/70 text-slate-300">
                <tr>
                  <th class="px-4 py-3 font-medium">Nº linea</th>
                  <th class="px-4 py-3 font-medium">Nombre</th>
                </tr>
              </thead>
              <tbody
                id="linesTableBody"
                class="divide-y divide-white/10 bg-white/[0.03]"
              ></tbody>
            </table>
          </div>
        </section>

        <section
          id="stopsView"
          class="hidden rounded-3xl border border-white/15 bg-white/[0.08] p-5 shadow-xl shadow-slate-950/20 backdrop-blur-xl sm:p-6"
        >
          <nav
            class="mb-4 flex flex-wrap items-center gap-2 rounded-2xl border border-white/15 bg-slate-900/45 p-2"
          >
            <button
              id="stopsBackIosBtn"
              aria-label="Atras"
              class="inline-flex items-center gap-1.5 rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-100 transition hover:bg-white/15"
            >
              <span class="text-base leading-none">‹</span>
            </button>
            <button
              id="stopsMenuToMenuBtn"
              aria-label="Inicio"
              class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-sm font-semibold text-slate-100 transition hover:bg-white/15"
            >
              ⌂
            </button>
            <button
              id="stopsMenuToLinesBtn"
              aria-label="Lineas"
              class="rounded-xl border border-cyan-300/35 bg-cyan-500/15 px-3 py-1.5 text-sm font-semibold text-cyan-100 transition hover:bg-cyan-500/25"
            >
              🚌
            </button>
          </nav>

          <div
            class="flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between"
          >
            <div>
              <p class="text-xs uppercase tracking-[0.2em] text-fuchsia-100/80">
                Tabla de paradas
              </p>
              <h2 class="mt-1 text-2xl font-semibold text-white">
                Todas las paradas
              </h2>
            </div>
          </div>

          <div class="mt-4 grid grid-cols-1 gap-3 md:grid-cols-2">
            <div class="relative">
              <input
                id="searchStopName"
                placeholder="Buscar por nombre de parada..."
                class="w-full rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 pr-10 text-sm text-slate-100 placeholder:text-slate-400 focus:border-fuchsia-300/70 focus:outline-none focus:ring-2 focus:ring-fuchsia-400/40"
              />
              <button
                id="clearSearchStopNameBtn"
                type="button"
                aria-label="Limpiar busqueda de paradas"
                class="absolute right-2 top-1/2 hidden -translate-y-1/2 rounded-lg border border-white/20 bg-white/10 px-2 py-0.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                X
              </button>
            </div>
            <div class="relative">
              <button
                id="stopLineFilterBtn"
                type="button"
                aria-haspopup="listbox"
                aria-expanded="false"
                class="flex w-full items-center justify-between rounded-2xl border border-white/20 bg-slate-950/35 px-4 py-2.5 text-sm text-slate-100 transition hover:bg-slate-900/40 focus:border-fuchsia-300/70 focus:outline-none focus:ring-2 focus:ring-fuchsia-400/40"
              >
                <span id="stopLineFilterLabel">Todas las lineas</span>
                <span class="text-xs text-slate-300/80">▼</span>
              </button>
              <div
                id="stopLineFilterPanel"
                class="custom-scroll absolute z-20 mt-2 hidden max-h-64 w-full overflow-auto rounded-2xl border border-white/15 bg-slate-900/95 p-2 shadow-2xl"
              >
                <div class="mb-2 flex items-center justify-between px-1">
                  <p
                    class="text-xs uppercase tracking-[0.18em] text-fuchsia-100/80"
                  >
                    Filtrar lineas
                  </p>
                  <button
                    id="clearStopLineFiltersBtn"
                    type="button"
                    class="rounded-lg border border-white/20 bg-white/10 px-2 py-1 text-[11px] font-semibold text-slate-100 transition hover:bg-white/15"
                  >
                    Limpiar
                  </button>
                </div>
                <div id="stopLineFilterOptions" class="space-y-1"></div>
              </div>
            </div>
          </div>

          <div
            class="custom-scroll mt-5 overflow-auto rounded-2xl border border-white/10"
          >
            <table
              class="min-w-full divide-y divide-white/10 text-left text-sm"
            >
              <thead class="bg-slate-900/70 text-slate-300">
                <tr>
                  <th class="px-4 py-3 font-medium">ID parada</th>
                  <th class="px-4 py-3 font-medium">Nombre de parada</th>
                  <th class="px-4 py-3 font-medium">Linea</th>
                </tr>
              </thead>
              <tbody
                id="stopsTableBody"
                class="divide-y divide-white/10 bg-white/[0.03]"
              ></tbody>
            </table>
          </div>
          <div class="mt-4 flex flex-wrap items-center justify-between gap-2">
            <p id="stopsPageInfo" class="text-xs text-slate-300/80">
              Pagina 1 de 1
            </p>
            <div class="flex items-center gap-2">
              <button
                id="stopsPrevPageBtn"
                class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                Anterior
              </button>
              <button
                id="stopsNextPageBtn"
                class="rounded-xl border border-white/20 bg-white/10 px-3 py-1.5 text-xs font-semibold text-slate-100 transition hover:bg-white/15"
              >
                Siguiente
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="emt.js"></script>
  </body>
</html>
